project:
  name: Worker
  version: 1.0.0
spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.mongo.MongoAutoConfiguration.class
  config:
    import:
      - postgres.yml
      - mongo.yml
      - batch.yml
  application:
    name: worker

logging:
  level:
    root: INFO
    org.springframework.batch: INFO
    com.midas.worker: INFO

solved:
  api:
    user-info: https://solved.ac/api/v3/user/show
    problem-info: https://solved.ac/api/v3/search/problem

slack:
  webhook:
    url: ${SLACK_WEBHOOK_URL}
  enabled: true
  color:
    green: '#36a64f'
    red: '#ff0000'
    white: '#fffff'
    yellow: '#ffcc00'
    blue: '#0070ce'
---

spring:
  config:
    activate:
      on-profile: local
logging:
  level:
    root: DEBUG
    com.midas.worker: DEBUG
    org.springframework.batch: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

---

spring:
  config:
    activate:
      on-profile: dev
logging:
  level:
    root: INFO
    org.springframework.batch: INFO
    com.midas.worker: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
