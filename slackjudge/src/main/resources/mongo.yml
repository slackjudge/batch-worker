spring:
  data:
    mongodb:
      auto-index-creation: true
      uri: mongodb://${MONGO_USER:}${MONGO_PASSWORD:}${MONGO_HOST:localhost}:${MONGO_PORT:27017}/${MONGO_DATABASE:app}

logging:
  level:
    org.springframework.data.mongodb.core.MongoTemplate: DEBUG
    org.mongodb.driver.protocol.command: DEBUG
    org.mongodb.driver.connection: DEBUG

---
spring.config.activate.on-profile: local

spring:
  data:
    mongodb:
      auto-index-creation: true
      uri: mongodb://localhost:27017/app

logging:
  level:
    org.springframework.data.mongodb.core.MongoTemplate: INFO
    org.mongodb.driver.protocol.command: INFO
    org.mongodb.driver.connection: INFO
