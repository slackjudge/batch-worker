# ============================================================================
# Worker Deploy Workflow
# ============================================================================
# 역할:
#   - Docker 이미지 빌드 및 ECR 푸시
#   - EventBridge 스케줄러가 다음 실행 시 자동으로 새 이미지 사용
#
# GitHub Secrets (Settings > Secrets and variables > Actions > Secrets):
#   - AWS_ACCESS_KEY_ID: AWS IAM Access Key
#   - AWS_SECRET_ACCESS_KEY: AWS IAM Secret Key
#
# GitHub Variables (Settings > Secrets and variables > Actions > Variables):
#   - ECR_REPOSITORY: Worker용 ECR 레포지토리 이름
# ============================================================================

name: Deploy Worker to ECR

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: ap-northeast-2

jobs:
  deploy:
    name: Build and Push
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        working-directory: ./slackjudge
        run: chmod +x gradlew

      - name: Build with Gradle
        working-directory: ./slackjudge
        run: ./gradlew build -x test

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./slackjudge
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ vars.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ vars.ECR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deployment Summary
        run: |
          echo "## Worker Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Image Tag** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **ECR Repository** | \`${{ vars.ECR_REPOSITORY }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Region** | \`${{ env.AWS_REGION }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> Worker는 다음 EventBridge 스케줄 실행 시 자동으로 새 이미지를 사용합니다" >> $GITHUB_STEP_SUMMARY
